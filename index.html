<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRUD Tarefas</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success mb-4">
  <div class="container">
    <span class="navbar-brand">CRUD Tarefas</span>
  </div>
</nav>

<div class="container">

  <!-- Alerta global -->
  <div id="alerta" class="alert d-none" role="alert"></div>

  <!-- FORMULARIO USUARIO -->
  <div class="card mb-4">
    <div class="card-header bg-success text-white">
      Cadastro de Tarefas
    </div>

    <div class="card-body">
      <form id="form-tarefa" onsubmit="salvarTarefa(this); return false;">

        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Descricao</label>
            <input type="text" class="form-control"
              name="descricao" placeholder="Descricao da tarefa" required />
          </div>

        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-success">Salvar</button>

          <button type="reset" class="btn btn-outline-secondary ms-2"
            onclick="this.form.dataset.editId = '';">
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- TABELA TAREFAS -->
  <div class="card mb-4">
    <div class="card-header">Lista de Tarefas</div>

    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Descricao</th>
            <th>Concluida</th>
            <th>Acoes</th>
          </tr>
        </thead>

        <tbody id="tbl-tarefa"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="main.mjs"></script>

</body>
</html>
